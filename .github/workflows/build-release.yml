name: Build Release

on:
  workflow_dispatch:

jobs:
  release:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Git - Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Version
        id: version
        uses: reecetech/version-increment@2024.4.4
        with:
          scheme: calver
          release_branch: main

      - name: Version - Update project files
        uses: vers-one/dotnet-project-version-updater@v1.7
        with:
          file: "src/**/*.csproj"
          version: ${{ steps.version.outputs.version }}

      - name: Release - Delete unpublished
        uses: hugo19941994/delete-draft-releases@v1.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Release - Notes
        id: notes
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          config-name: release-drafter.yml
          name: "Sidekick v${{ steps.version.outputs.version }}"
          tag: "v${{ steps.version.outputs.version }}"
          version: "v${{ steps.version.outputs.version }}"
          publish: false
          prerelease: false

      - name: .NET - Setup
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Data - Publish
        shell: bash
        run: |
          dotnet publish src/Sidekick.Data.Builder.Cli/Sidekick.Data.Builder.Cli.csproj -c Release -o src/Sidekick.Data.Builder.Cli/build --self-contained true
          chmod +x ./src/Sidekick.Data.Builder.Cli/build

      - name: Data - Execute
        shell: bash
        run: |
          dotnet ./src/Sidekick.Data.Builder.Cli/build/Sidekick.Data.Builder.Cli.dll

      - name: .NET - Test
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          dotnet restore
          dotnet build --no-restore
          dotnet test --no-build --verbosity normal

      - name: .NET - Publish (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          dotnet publish src/Sidekick.Wpf/Sidekick.Wpf.csproj -c Release -r win-x64 -o ./Publish
          dotnet publish src/Sidekick.Web/Sidekick.Web.csproj -c Release -r win-x64 -o ./Publish-Web

      - name: Velopack (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          Write-Output "Version: $version"

          $body = "${{ steps.notes.outputs.body }}"
          Write-Output "Body: $body"

          # Output the body to a .md file
          $releaseNotesPath = "release-notes.md"
          Set-Content -Path $releaseNotesPath -Value $body
          Write-Output "Release notes saved to $releaseNotesPath"

          dotnet tool install -g vpk

          # Desktop version
          vpk download github --repoUrl https://github.com/Sidekick-Poe/Sidekick --channel win-desktop
          vpk pack --packId Sidekick --packVersion $version --packDir Publish --channel win-desktop --releaseNotes $releaseNotesPath --framework net8.0-x64-desktop,webview2
          vpk upload github --repoUrl https://github.com/Sidekick-Poe/Sidekick --channel win-desktop --merge --releaseName "Sidekick v$version" --tag v$version --token ${{ github.token }}

          # Migrate old channel name for existing users
          Copy-Item "releases.win-desktop.json" -Destination "releases.windows-stable.json"
          gh release upload "v$version" "releases.windows-stable.json" --clobber

          # Web version
          vpk download github --repoUrl https://github.com/Sidekick-Poe/Sidekick --channel win-web
          vpk pack --packId Sidekick --packVersion $version --packDir Publish-Web --channel win-web --releaseNotes $releaseNotesPath --framework net8.0-x64-aspnetcore,net8.0-x64-runtime
          vpk upload github --repoUrl https://github.com/Sidekick-Poe/Sidekick --channel win-web --merge --releaseName "Sidekick v$version" --tag v$version --token ${{ github.token }}

          # Migrate old channel name for existing users
          Copy-Item "releases.win-web.json" -Destination "releases.windows-web-stable.json"
          gh release upload "v$version" "releases.windows-web-stable.json" --clobber

      - name: .NET - Publish (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          dotnet build src/Sidekick.PhotinoBlazor/Sidekick.PhotinoBlazor.csproj -c Release -r linux-x64

          dotnet publish src/Sidekick.PhotinoBlazor/Sidekick.PhotinoBlazor.csproj -c Release -r linux-x64 -o ./Publish
          dotnet publish src/Sidekick.Web/Sidekick.Web.csproj -c Release -r linux-x64 -o ./Publish-Web

      - name: Velopack (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.version.outputs.version }}"
          echo "Version: $version"

          body="${{ steps.notes.outputs.body }}"
          echo "Body: $body"

          # Output the body to a .md file
          releaseNotesPath="release-notes.md"
          echo "$body" > "$releaseNotesPath"
          echo "Release notes saved to $releaseNotesPath"

          dotnet tool install -g vpk
          export PATH="$PATH:$HOME/.dotnet/tools"

          # Desktop version
          vpk download github --repoUrl https://github.com/Sidekick-Poe/Sidekick --channel linux-desktop
          vpk pack --packId Sidekick --packVersion $version --packDir Publish --channel linux-desktop --releaseNotes $releaseNotesPath
          vpk upload github --repoUrl https://github.com/Sidekick-Poe/Sidekick --channel linux-desktop --merge --releaseName "Sidekick v$version" --tag v$version --token ${{ github.token }}

          # Migrate old channel name for existing users
          cp releases.linux-desktop.json releases.linux-stable.json
          gh release upload "v$version" releases.linux-stable.json --clobber

          # Web version
          vpk download github --repoUrl https://github.com/Sidekick-Poe/Sidekick --channel linux-web
          vpk pack --packId Sidekick --packVersion $version --packDir Publish-Web --channel linux-web --releaseNotes $releaseNotesPath
          vpk upload github --repoUrl https://github.com/Sidekick-Poe/Sidekick --channel linux-web --merge --releaseName "Sidekick v$version" --tag v$version --token ${{ github.token }}

          # Migrate old channel name for existing users
          cp releases.linux-web.json releases.linux-web-stable.json
          gh release upload "v$version" releases.linux-web-stable.json --clobber
