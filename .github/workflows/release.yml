name: Release

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_id: ${{ steps.notes.outputs.id }}
      release_body: ${{ steps.notes.outputs.body }}
    steps:
      - name: Git - Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Version
        id: version
        uses: reecetech/version-increment@2024.4.4
        with:
          scheme: calver
          release_branch: ${{ github.ref_name }}

      - name: Release - Delete unpublished
        uses: hugo19941994/delete-draft-releases@v1.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Release - Notes
        id: notes
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          config-name: release-drafter.yml
          name: "Sidekick v${{ steps.version.outputs.version }}"
          tag: "v${{ steps.version.outputs.version }}"
          version: "v${{ steps.version.outputs.version }}"
          publish: false
          prerelease: false

  build-windows:
    needs:
      - setup
    runs-on: windows-latest
    steps:
      - name: Git - Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Version - Update project files
        uses: vers-one/dotnet-project-version-updater@v1.7
        with:
          file: "src/**/*.csproj"
          version: ${{ needs.setup.outputs.version }}

      - name: .NET - Setup
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Data - Publish
        shell: bash
        run: |
          dotnet publish src/Sidekick.Data.Builder.Cli/Sidekick.Data.Builder.Cli.csproj -c Release -o src/Sidekick.Data.Builder.Cli/build --self-contained true
          chmod +x ./src/Sidekick.Data.Builder.Cli/build

      - name: Data - Execute
        shell: bash
        run: |
          dotnet ./src/Sidekick.Data.Builder.Cli/build/Sidekick.Data.Builder.Cli.dll

      - name: .NET - Test
        shell: pwsh
        run: |
          dotnet restore
          dotnet build --no-restore
          dotnet test --no-build --verbosity normal

      - name: .NET - Publish (Windows)
        shell: pwsh
        run: |
          dotnet publish src/Sidekick.Avalonia/Sidekick.Avalonia.csproj -c Release -r win-x64 -o ./Publish
          dotnet publish src/Sidekick.Web/Sidekick.Web.csproj -c Release -r win-x64 -o ./Publish-Web

      - name: Velopack (Windows)
        shell: pwsh
        run: |
          $version = "${{ needs.setup.outputs.version }}"
          Write-Output "Version: $version"

          $body = "${{ needs.setup.outputs.release_body }}"
          Write-Output "Body: $body"

          # Output the body to a .md file
          $releaseNotesPath = "release-notes.md"
          Set-Content -Path $releaseNotesPath -Value $body
          Write-Output "Release notes saved to $releaseNotesPath"

          dotnet tool install -g vpk

          # Desktop version (windows-x64)
          $ErrorActionPreference = 'SilentlyContinue'
          vpk download github --repoUrl https://github.com/Sidekick-Poe/Sidekick --channel windows-x64
          $ErrorActionPreference = 'Stop'
          
          vpk pack --packId Sidekick --packVersion $version --packDir Publish --channel windows-x64 --releaseNotes $releaseNotesPath --framework net10.0-x64-desktop,webview2
          vpk upload github --repoUrl https://github.com/Sidekick-Poe/Sidekick --channel windows-x64 --merge --releaseName "Sidekick v$version" --tag v$version --token ${{ github.token }}

          # Web version (windows-web-x64)
          $ErrorActionPreference = 'SilentlyContinue'
          vpk download github --repoUrl https://github.com/Sidekick-Poe/Sidekick --channel windows-web-x64
          $ErrorActionPreference = 'Stop'
          
          vpk pack --packId Sidekick --packVersion $version --packDir Publish-Web --channel windows-web-x64 --releaseNotes $releaseNotesPath --mainExe Sidekick.Web.exe --framework net10.0-x64-aspnetcore,net10.0-x64-runtime
          vpk upload github --repoUrl https://github.com/Sidekick-Poe/Sidekick --channel windows-web-x64 --merge --releaseName "Sidekick v$version" --tag v$version --token ${{ github.token }}

      - name: Old Channels (Windows)
        shell: pwsh
        run: |
          # Retrieve the version from setup outputs
          $version = "${{ needs.setup.outputs.version }}"
          $env:GH_TOKEN = "${{ github.token }}"
        
          # Handle Desktop channel
          gh release download "v$version" --pattern "releases.windows-x64.json" --clobber
          Rename-Item -Path "releases.windows-x64.json" -NewName "releases.windows-stable.json" -Force
          gh release upload "v$version" "releases.windows-stable.json" --clobber
        
          # Handle Web channel
          gh release download "v$version" --pattern "releases.windows-web-x64.json" --clobber
          Rename-Item -Path "releases.windows-web-x64.json" -NewName "releases.windows-web-stable.json" -Force
          gh release upload "v$version" "releases.windows-web-stable.json" --clobber

  build-linux:
    needs:
      - setup
    runs-on: ubuntu-latest
    steps:
      - name: Git - Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Version - Update project files
        uses: vers-one/dotnet-project-version-updater@v1.7
        with:
          file: "src/**/*.csproj"
          version: ${{ needs.setup.outputs.version }}

      - name: .NET - Setup
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Data - Publish
        shell: bash
        run: |
          dotnet publish src/Sidekick.Data.Builder.Cli/Sidekick.Data.Builder.Cli.csproj -c Release -o src/Sidekick.Data.Builder.Cli/build --self-contained true
          chmod +x ./src/Sidekick.Data.Builder.Cli/build

      - name: Data - Execute
        shell: bash
        run: |
          dotnet ./src/Sidekick.Data.Builder.Cli/build/Sidekick.Data.Builder.Cli.dll

      - name: .NET - Publish (Linux)
        shell: bash
        run: |
          dotnet publish src/Sidekick.Avalonia/Sidekick.Avalonia.csproj -c Release -r linux-x64 -o ./Publish
          dotnet publish src/Sidekick.Web/Sidekick.Web.csproj -c Release -r linux-x64 -o ./Publish-Web

      - name: Velopack (Linux)
        shell: bash
        run: |
          version="${{ needs.setup.outputs.version }}"
          echo "Version: $version"

          body="${{ needs.setup.outputs.release_body }}"
          echo "Body: $body"

          # Output the body to a .md file
          releaseNotesPath="release-notes.md"
          echo "$body" > "$releaseNotesPath"
          echo "Release notes saved to $releaseNotesPath"

          dotnet tool install -g vpk
          export PATH="$PATH:$HOME/.dotnet/tools"

          # Desktop version (linux-x64)
          vpk download github --repoUrl https://github.com/Sidekick-Poe/Sidekick --channel linux-x64 || echo "First release for this channel, skipping download."
          vpk pack --packId Sidekick --packVersion $version --packDir Publish --channel linux-x64 --releaseNotes $releaseNotesPath
          vpk upload github --repoUrl https://github.com/Sidekick-Poe/Sidekick --channel linux-x64 --merge --releaseName "Sidekick v$version" --tag v$version --token ${{ github.token }}

          # Web version (linux-web-x64)
          vpk download github --repoUrl https://github.com/Sidekick-Poe/Sidekick --channel linux-web-x64 || echo "First release for this channel, skipping download."
          vpk pack --packId Sidekick --packVersion $version --packDir Publish-Web --channel linux-web-x64 --releaseNotes $releaseNotesPath --mainExe Sidekick.Web
          vpk upload github --repoUrl https://github.com/Sidekick-Poe/Sidekick --channel linux-web-x64 --merge --releaseName "Sidekick v$version" --tag v$version --token ${{ github.token }}

      - name: Old Channels (Linux)
        shell: pwsh
        run: |
          # Retrieve the version from setup outputs
          $version = "${{ needs.setup.outputs.version }}"
          $env:GH_TOKEN = "${{ github.token }}"

          # Handle Desktop channel
          gh release download "v$version" --pattern "releases.linux-x64.json" --clobber
          mv "releases.linux-x64.json" "releases.linux-stable.json"
          gh release upload "v$version" "releases.linux-stable.json" --clobber

          # Handle Web channel
          gh release download "v$version" --pattern "releases.linux-web-x64.json" --clobber
          mv "releases.linux-web-x64.json" "releases.linux-web-stable.json"
          gh release upload "v$version" "releases.linux-web-stable.json" --clobber
